<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Malawi</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Open+Sans&display=swap" rel="stylesheet">
<style>
body{font-family:'Open Sans';margin:0;background:#f8f9fa;}
nav{background:#0077b6;padding:15px;color:white;display:flex;justify-content:space-between;}
nav button{background:#e76f51;border:none;padding:8px 15px;color:white;border-radius:20px;cursor:pointer;}
.container{padding:40px;}
.hidden{display:none;}
input,textarea{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
.card{background:white;border-radius:10px;overflow:hidden;margin:10px 0;}
.card img{width:100%;height:200px;object-fit:cover;}
.card-content{padding:15px;}
.btn{background:#0077b6;color:white;padding:10px 15px;border:none;border-radius:20px;cursor:pointer;margin-top:5px;}
.admin-panel{background:white;padding:20px;border-radius:10px;margin-bottom:10px;}
</style>
</head>
<body>

<nav>
<div>Explore Malawi</div>
<div id="authButtons">
  <button onclick="showLogin()">Login</button>
  <button onclick="showRegister()">Register</button>
</div>
<div id="userWelcome" class="hidden">
  <span id="usernameDisplay"></span>
  <button onclick="logout()">Logout</button>
</div>
</nav>

<div class="container">

<!-- AUTH UI -->
<div id="authUI"></div>

<!-- MAIN CONTENT -->
<div id="mainContent">

<h2>Top Destinations</h2>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Lake_Malawi_seen_from_space.jpg">
<div class="card-content">
<h3>Lake Malawi</h3>
<a href="https://www.google.com/maps?q=Lake+Malawi" target="_blank" class="btn">View Map</a>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Liwonde_National_Park_Elephants.jpg">
<div class="card-content">
<h3>Liwonde National Park</h3>
<a href="https://www.google.com/maps?q=Liwonde+National+Park" class="btn" target="_blank">View Map</a>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Mount_Mulanje.jpg">
<div class="card-content">
<h3>Mount Mulanje</h3>
<a href="https://www.google.com/maps?q=Mount+Mulanje" class="btn" target="_blank">View Map</a>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Blantyre_Malawi.jpg">
<div class="card-content">
<h3>Blantyre</h3>
<a href="https://www.google.com/maps?q=Blantyre+Malawi" class="btn" target="_blank">View Map</a>
</div>
</div>

<h2>Send Inquiry</h2>
<input type="text" id="msgName" placeholder="Your Name">
<input type="email" id="msgEmail" placeholder="Your Email">
<textarea id="msgText" placeholder="Your message"></textarea>
<button class="btn" onclick="sendMessage()">Send Message</button>

<h2>Contact Admin</h2>
<p>📞 +265981555737</p>
<a href="https://wa.me/265890423353" class="btn" target="_blank">WhatsApp Chat</a>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<h2>Admin Panel</h2>
<div id="messagesList"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 CONFIG - REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🔹 AUTH UI
function showRegister(){
document.getElementById('authUI').innerHTML = `
<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button class="btn" onclick="registerUser()">Create Account</button>`;
}

function showLogin(){
document.getElementById('authUI').innerHTML = `
<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn" onclick="loginUser()">Login</button>`;
}

function registerUser(){
let email = document.getElementById('regEmail').value;
let password = document.getElementById('regPass').value;
auth.createUserWithEmailAndPassword(email, password)
.then(() => {alert('Registered successfully'); showLogin();})
.catch(err => alert(err.message));
}

function loginUser(){
let email = document.getElementById('logEmail').value;
let password = document.getElementById('logPass').value;
auth.signInWithEmailAndPassword(email, password)
.then(cred => {document.getElementById('authUI').innerHTML=''; updateUI(cred.user);})
.catch(err => alert(err.message));
}

function logout(){auth.signOut(); updateUI(null);}

auth.onAuthStateChanged(user => {updateUI(user);});

function updateUI(user){
if(user){
document.getElementById('authButtons').classList.add('hidden');
document.getElementById('userWelcome').classList.remove('hidden');
document.getElementById('usernameDisplay').innerText = user.email;
checkAdmin(user);
}else{
document.getElementById('authButtons').classList.remove('hidden');
document.getElementById('userWelcome').classList.add('hidden');
document.getElementById('adminPanel').classList.add('hidden');
document.getElementById('mainContent').classList.remove('hidden');
}
}

// 🔹 CHECK ADMIN
function checkAdmin(user){
if(user.email === "rashidadamm344@gmail.com"){
document.getElementById('adminPanel').classList.remove('hidden');
document.getElementById('mainContent').classList.add('hidden');
loadMessages();
}else{
document.getElementById('mainContent').classList.remove('hidden');
document.getElementById('adminPanel').classList.add('hidden');
}
}

// 🔹 SEND MESSAGE
function sendMessage(){
let name = document.getElementById('msgName').value;
let email = document.getElementById('msgEmail').value;
let text = document.getElementById('msgText').value;
db.collection('messages').add({name,email,text,time:Date.now()})
.then(()=> alert('Message sent!'))
.catch(err => alert(err.message));
}

// 🔹 LOAD MESSAGES (ADMIN)
function loadMessages(){
document.getElementById('messagesList').innerHTML = '';
db.collection('messages').orderBy('time','desc').get()
.then(snapshot=>{
snapshot.forEach(doc => {
let m = doc.data();
document.getElementById('messagesList').innerHTML += `
<div class="admin-panel">
<p><strong>${m.name}</strong> (${m.email})</p>
<p>${m.text}</p><hr>
</div>`;
});
});
}
</script>

</body>
  </html>
